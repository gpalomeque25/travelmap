<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>PGC Travel Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; background:#141420; font-family:'Open Sans','Segoe UI',sans-serif; color:#ccc; }

    /* ── Titlebar ── */
    #titlebar { position:fixed; top:0; left:0; right:0; height:46px; z-index:1000;
      background:rgba(14,14,28,0.97); border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; gap:12px; padding:0 18px; }
    #titlebar h1 { font-size:15px; font-weight:700; color:#fff; white-space:nowrap; }
    #titlebar .sub { font-size:12px; color:#555; white-space:nowrap; }
    #point-count { margin-left:auto; font-size:13px; font-weight:600; color:#7ac3dd; white-space:nowrap; }

    /* ── Panel toggle (mobile only) ── */
    #panel-toggle { display:none; position:fixed; bottom:20px; right:16px; z-index:1100;
      background:#7ac3dd; color:#141420; border:none; border-radius:50%; width:44px; height:44px;
      font-size:20px; cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,.5); align-items:center; justify-content:center; }

    /* ── Desktop layout ── */
    #map { position:fixed; top:46px; left:0; right:310px; bottom:0; }
    #panel { position:fixed; top:46px; right:0; bottom:0; width:310px; z-index:999;
      background:rgba(12,12,24,0.97); border-left:1px solid rgba(255,255,255,0.07);
      overflow-y:auto; display:flex; flex-direction:column; }

    /* ── Mobile layout ── */
    @media (max-width: 768px) {
      #map { position:fixed; top:46px; left:0; right:0; bottom:220px; }
      #panel { position:fixed; left:0; right:0; bottom:0; top:auto; width:100%;
        height:220px; border-left:none; border-top:2px solid rgba(122,195,221,0.3);
        box-shadow:0 -4px 20px rgba(0,0,0,.5); transition:transform .3s ease; overflow-y:auto; }
      #panel.panel-hidden { transform:translateY(calc(100% - 32px)); }
      #panel.panel-hidden + #panel-toggle { bottom: 40px; }
      #panel-toggle { display:flex; }
      #titlebar .sub { display:none; }
      #titlebar h1 { font-size:14px; }
      #point-count { font-size:12px; }
    }
    .p-section { padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.06); }
    .p-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
      color:#444; margin-bottom:10px; }

    /* Legend — clickable toggles */
    .leg-row { display:flex; align-items:center; gap:9px; margin-bottom:7px;
      cursor:pointer; user-select:none; border-radius:5px; padding:3px 5px; margin-left:-5px;
      transition:opacity .15s; }
    .leg-row:last-child { margin-bottom:0; }
    .leg-row:hover { background:rgba(255,255,255,0.04); }
    .leg-row.leg-off { opacity:.3; }
    .leg-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; border:2px solid rgba(255,255,255,0.4); }
    .leg-label { font-size:12px; color:#bbb; }
    .leg-hint { font-size:10px; color:#444; margin-top:6px; }

    /* Filters */
    .f-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
    .f-row:last-child { margin-bottom:0; }
    .f-label { font-size:12px; color:#aaa; }
    .f-select { background:#1a1a2e; border:1px solid rgba(255,255,255,0.12); color:#ccc;
      font-size:11px; padding:4px 7px; border-radius:5px; cursor:pointer; outline:none; }
    .f-toggle { display:flex; align-items:center; gap:7px; cursor:pointer; }
    .f-toggle input { accent-color:#a9d380; width:14px; height:14px; cursor:pointer; }
    .btn-reset { font-size:11px; color:#555; background:none; border:1px solid rgba(255,255,255,0.1);
      padding:3px 10px; border-radius:4px; cursor:pointer; margin-top:6px; width:100%; }
    .btn-reset:hover { color:#aaa; border-color:rgba(255,255,255,0.25); }

    /* Popups */
    .leaflet-popup-content-wrapper { background:rgba(18,18,34,0.97); border:1px solid rgba(255,255,255,0.13);
      border-radius:10px; color:#eee; font-family:'Open Sans',sans-serif; box-shadow:0 4px 20px rgba(0,0,0,.6); }
    .leaflet-popup-tip { background:rgba(18,18,34,0.97); }
    .leaflet-popup-content { font-size:13px; line-height:1.6; min-width:175px; padding:2px 0; }
    .leaflet-popup-content b { color:#fff; font-size:14px; display:block; margin-bottom:2px; }
    .leaflet-popup-content a.view-deal { color:#7ac3dd; text-decoration:none; font-size:12px; }
    .leaflet-popup-content a.view-deal:hover { text-decoration:underline; }
    .popup-img { margin-top:6px; width:100%; border-radius:4px; display:block; }
    .popup-tag { display:inline-block; margin:2px 3px 2px 0; padding:2px 8px;
      border-radius:4px; font-size:10px; font-weight:700; }
    .popup-deadline { background:#a9d380; color:#141420; }
    .popup-family   { background:#fcd988; color:#141420; }
    .popup-season   { background:rgba(255,255,255,0.12); color:#ccc; }
    /* Upload button — prominent CTA */
    .popup-upload { display:block; margin-top:10px; padding:8px 14px; text-align:center;
      border-radius:6px; font-size:12px; font-weight:700; letter-spacing:.03em;
      background:#ff6b35; color:#fff !important; text-decoration:none !important;
      border:none; transition:background .15s; }
    .popup-upload:hover { background:#ff8555; color:#fff !important; }
    .marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div
      { background-color:#7ac3dd; color:#141420; font-weight:700; }
    .marker-cluster-small,.marker-cluster-medium,.marker-cluster-large
      { background-color:rgba(122,195,221,0.25); }
    #status-msg { position:fixed; top:56px; left:50%; transform:translateX(-50%);
      z-index:998; padding:8px 18px; border-radius:6px; font-size:13px;
      white-space:nowrap; display:none; color:#fff; }
  </style>
</head>
<body>
<div id="titlebar">
  <h1>&#127988; PGC Travel Map</h1>
  <span class="sub">Holiday Pirates &#183; Partner-Generated Content</span>
  <span id="point-count"></span>
</div>
<div id="status-msg"></div>
<div id="map"></div>
<button id="panel-toggle" title="Toggle panel" onclick="togglePanel()">&#9776;</button>

<div id="panel">
  <!-- Legend (clickable filters) -->
  <div class="p-section">
    <div class="p-title">Legend &#8212; click to show/hide</div>
    <div class="leg-row" id="leg-green" onclick="toggleLegend('green')">
      <div class="leg-dot" style="background:#a9d380"></div>
      <span class="leg-label">PGC Destination</span>
    </div>
    <div class="leg-row" id="leg-blue" onclick="toggleLegend('blue')">
      <div class="leg-dot" style="background:#7ac3dd"></div>
      <span class="leg-label">(S)PGC Hotel</span>
    </div>
    <div class="leg-hint">Click any row to toggle visibility</div>
  </div>

  <!-- Filters -->
  <div class="p-section">
    <div class="p-title">Filters</div>
    <div class="f-row">
      <label class="f-toggle"><input type="checkbox" id="f-family" onchange="applyFilters()">
        <span class="f-label">&#127958;&#65039; Family deals only</span></label>
    </div>
    <div class="f-row">
      <span class="f-label">Season</span>
      <select class="f-select" id="f-season" onchange="applyFilters()">
        <option value="">All seasons</option>
        <option value="summer">&#9728;&#65039; Summer</option>
        <option value="winter">&#10052;&#65039; Winter</option>
      </select>
    </div>
    <div class="f-row">
      <span class="f-label">Added</span>
      <select class="f-select" id="f-recent" onchange="applyFilters()">
        <option value="">All time</option>
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetAll()">&#8634; Reset all</button>
  </div>
</div>

<script>
  // ════════════════════════════════════════════════════════════════
  // CONFIG — audience switches. THIS IS THE COLLEAGUES (company) FILE:
  // budget tiers and PGC compensation rates are NOT rendered.
  // ════════════════════════════════════════════════════════════════
  const SHOW_BUDGET = false;        // false = all hotels one color, no budget legend
  const HOTELS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVaW9Ob_dKfnVAbCZ-I3PDKlInuK52WNU72v4AAmyZhVI50mZbgqy7ay561odtImwmG-92_F_S-KUX/pub?gid=0&single=true&output=csv';
  const PGC_URL    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVaW9Ob_dKfnVAbCZ-I3PDKlInuK52WNU72v4AAmyZhVI50mZbgqy7ay561odtImwmG-92_F_S-KUX/pub?gid=1637414386&single=true&output=csv';
  const UPLOAD_URL = 'https://holidaypirates.canto.global/u/u-e8b306b753dd40b29a62e29ba52dd122_2adaf097816b4969b8158f670ef1d2d5?viewIndex=0';
  const COLOR = { blue:'#7ac3dd', yellow:'#fcd988', pink:'#f79f9d', green:'#a9d380' };

  // Legend toggle state
  const showTypes = { green:true, blue:true, yellow:true, pink:true };

  // Robust header lookup: sheet headers sometimes carry stray spaces/tabs
  function getCol(row, name) {
    if (row[name] !== undefined && row[name] !== null && String(row[name]).trim() !== '') return String(row[name]).trim();
    const want = name.toLowerCase();
    for (const k in row) {
      const kk = k.replace(/\s+/g,' ').trim().toLowerCase();
      if (kk === want && row[k] != null && String(row[k]).trim() !== '') return String(row[k]).trim();
    }
    return '';
  }
  // Fuzzy: first header CONTAINING the fragment with a non-empty value
  function getColLike(row, fragment) {
    const want = fragment.toLowerCase();
    for (const k in row) {
      if (k.toLowerCase().indexOf(want) > -1 && row[k] != null && String(row[k]).trim() !== '') return String(row[k]).trim();
    }
    return '';
  }
  // Like getColLike but only accepts URL values (the sheet has a malformed
  // "Budget Extra (€) / Link Preview" merged header that must not win)
  function getUrlColLike(row, fragment) {
    const want = fragment.toLowerCase();
    for (const k in row) {
      if (k.toLowerCase().indexOf(want) > -1 && row[k] != null) {
        const v = String(row[k]).trim();
        if (/^https?:\/\//i.test(v)) return v;
      }
    }
    return '';
  }

  function toggleLegend(type) {
    showTypes[type] = !showTypes[type];
    const el = document.getElementById('leg-'+type);
    if (el) el.classList.toggle('leg-off', !showTypes[type]);
    if (type === 'green') {
      allPgcMarkers.forEach(function(m){ showTypes.green ? pgcLayer.addLayer(m) : pgcLayer.removeLayer(m); });
      updateCount();
    } else {
      applyFilters();
    }
  }

  function hotelColor(b){
    if (!SHOW_BUDGET) return 'blue';
    b=parseFloat(b)||0; return b<=0?'blue':b<=100?'yellow':'pink';
  }
  function makeCircle(color,size){
    return L.divIcon({className:'',
      html:'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+COLOR[color]+';border:2px solid rgba(255,255,255,0.6);box-shadow:0 0 6px '+COLOR[color]+'88;"></div>',
      iconSize:[size,size],iconAnchor:[size/2,size/2]});
  }

  const map = L.map('map',{zoomControl:true}).setView([47,12],5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

  const hotelCluster = L.markerClusterGroup({chunkedLoading:true});
  const pgcLayer = L.layerGroup();
  map.addLayer(hotelCluster); map.addLayer(pgcLayer);

  let allHotelMarkers=[], allPgcMarkers=[], pgcCount=0;

  function showStatus(m,bg){const e=document.getElementById('status-msg');e.textContent=m;e.style.background=bg||'rgba(14,14,28,0.9)';e.style.display='block';}
  function hideStatus(){document.getElementById('status-msg').style.display='none';}

  function updateCount(shownHotels) {
    const h = (shownHotels !== undefined) ? shownHotels : allHotelMarkers.filter(i => hotelCluster.hasLayer(i.marker)).length;
    const p = showTypes.green ? pgcCount : 0;
    document.getElementById('point-count').textContent = h+' hotel'+(h!==1?'s':'')+' · '+p+' destination'+(p!==1?'s':'');
  }

  function applyFilters(){
    hotelCluster.clearLayers();
    const famOnly = document.getElementById('f-family').checked;
    const season  = document.getElementById('f-season').value;
    const recent  = parseInt(document.getElementById('f-recent').value)||0;
    const now = new Date();
    let shown=0;
    allHotelMarkers.forEach(function(item){
      let ok = true;
      if (!showTypes[item.colorType]) ok = false;
      if (ok && famOnly && !item.family) ok = false;
      if (ok && season && item.season && item.season!=='all' && item.season!==season) ok = false;
      if (ok && recent && item.dateAdded){
        const d=new Date(item.dateAdded);
        if(!isNaN(d)&&(now-d)/86400000>recent) ok=false;
      }
      if(ok){hotelCluster.addLayer(item.marker);shown++;}
    });
    updateCount(shown);
  }

  function resetAll(){
    document.getElementById('f-family').checked=false;
    document.getElementById('f-season').value='';
    document.getElementById('f-recent').value='';
    ['green','blue','yellow','pink'].forEach(function(t){
      showTypes[t]=true;
      const el=document.getElementById('leg-'+t);
      if (el) el.classList.remove('leg-off');
    });
    allPgcMarkers.forEach(function(m){ pgcLayer.addLayer(m); });
    applyFilters();
  }

  function loadHotels(){
    return new Promise(function(resolve){
      Papa.parse(HOTELS_URL,{download:true,header:true,skipEmptyLines:true,
        complete:function(r){
          r.data.forEach(function(row){
            const lat=parseFloat(row['Latitude']),lng=parseFloat(row['Longitude']);
            if(isNaN(lat)||isNaN(lng))return;
            const name=getCol(row,'Name');
            const loc=getCol(row,'Location')||getCol(row,'City');
            const budgetRaw = SHOW_BUDGET ? getColLike(row,'budget extra') : 0;
            const colorType=hotelColor(budgetRaw);
            const link=getCol(row,'Deal Link')||getCol(row,'Link');
            // Image column (filled by the Apps Script) first, then Link Preview as fallback
            const img=getCol(row,'Image')||getUrlColLike(row,'preview');
            const family=/yes|true|1/i.test(String(row['Family']||''));
            const season=(getCol(row,'Season')||'').toLowerCase()||'all';
            const dateAdded=getCol(row,'Date Added')||getCol(row,'DateAdded');

            let tags='';
            if(family) tags+='<span class="popup-tag popup-family">👨‍👩‍👧 Family</span>';
            if(season&&season!=='all') tags+='<span class="popup-tag popup-season">'+(season==='summer'?'☀️ Summer':'❄️ Winter')+'</span>';

            let p='<b>'+name+'</b>';
            if(loc) p+='<br>'+loc;
            if(tags) p+='<br>'+tags;
            if(img && /^https?:\/\//i.test(img)) p+='<img class="popup-img" src="'+img+'" loading="lazy" onerror="this.style.display=\'none\'" />';
            if(link) p+='<br><a class="view-deal" href="'+(link.indexOf('http')===0?link:'https://'+link)+'" target="_blank">View Deal →</a>';
            p+='<a class="popup-upload" href="'+UPLOAD_URL+'" target="_blank">↗ Upload to Canto</a>';

            const marker=L.marker([lat,lng],{icon:makeCircle(colorType,12)}).bindPopup(p);
            allHotelMarkers.push({marker,family,season,dateAdded,colorType});
          });
          resolve();
        },
        error:function(e){console.error(e);resolve();}
      });
    });
  }

  function loadPGCOpenings(){
    return new Promise(function(resolve){
      Papa.parse(PGC_URL,{download:true,header:true,skipEmptyLines:true,
        complete:function(r){
          r.data.forEach(function(row){
            const lat=parseFloat(row['Lat']||row['Latitude']);
            const lng=parseFloat(row['Lng']||row['Longitude']);
            if(isNaN(lat)||isNaN(lng))return;
            const dest=(row['Destination']||row['Name']||'').trim();
            const loc=(row['Location']||'').trim();
            const dl=(row['Deadline']||'').trim();
            const notes=(row['Notes']||'').trim();
            const uplink=(row['Upload Link']||row['Upload']||'').trim();
            let p='<b>'+dest+'</b>';
            if(loc) p+='<br>'+loc;
            if(dl)  p+='<br><span class="popup-tag popup-deadline">📅 Deadline: '+dl+'</span>';
            if(notes) p+='<br><small style="color:#aaa;">'+notes+'</small>';
            p+='<a class="popup-upload" href="'+(uplink||UPLOAD_URL)+'" target="_blank">↗ Upload to Canto</a>';
            const marker=L.marker([lat,lng],{icon:makeCircle('green',14)}).bindPopup(p);
            allPgcMarkers.push(marker);
            pgcLayer.addLayer(marker);
            pgcCount++;
          });
          resolve();
        },
        error:function(e){console.error(e);resolve();}
      });
    });
  }

  function togglePanel(){
    const panel = document.getElementById('panel');
    const btn = document.getElementById('panel-toggle');
    panel.classList.toggle('panel-hidden');
    btn.textContent = panel.classList.contains('panel-hidden') ? '☰' : '✕';
    setTimeout(function(){ map.invalidateSize(); }, 320);
  }

  // On mobile, start with panel partially hidden so map is usable
  if (window.innerWidth <= 768) {
    document.getElementById('panel').classList.add('panel-hidden');
  }

  window.addEventListener('resize', function(){
    map.invalidateSize();
    if (window.innerWidth > 768) {
      document.getElementById('panel').classList.remove('panel-hidden');
    }
  });

  // ── Width/zoom fix for Google Sites iframes ──────────────────────
  // Sites renders the iframe before it has its final size, so Leaflet
  // measures a wrong (small/zero) container → tiles misplaced, wrong
  // zoom, dead space. Re-measure aggressively after load, then fit
  // the view to the actual data.
  function fitToData(){
    map.invalidateSize();
    let b = null;
    if (allHotelMarkers.length) b = hotelCluster.getBounds();
    if (allPgcMarkers.length) {
      const pb = L.featureGroup(allPgcMarkers).getBounds();
      b = b && b.isValid() ? b.extend(pb) : pb;
    }
    if (b && b.isValid()) map.fitBounds(b, { padding:[40,40], maxZoom:7 });
  }
  [250, 800, 2000].forEach(function(ms){ setTimeout(function(){ map.invalidateSize(); }, ms); });
  window.addEventListener('load', function(){ setTimeout(function(){ map.invalidateSize(); }, 100); });

  async function loadAll(){
    showStatus('Loading map data…','rgba(122,195,221,0.15)');
    await Promise.all([loadHotels(),loadPGCOpenings()]);
    applyFilters();
    fitToData();
    hideStatus();
  }
  loadAll();
</script>
</body>
</html>
