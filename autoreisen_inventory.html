        const country = loc => loc.split(",").pop().trim();
        const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

        const map = L.map('map').setView([49, 12], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        const markers = L.markerClusterGroup({
            maxClusterRadius: 45,
            disableClusteringAtZoom: 9,
            spiderfyOnMaxZoom: true
        });
        map.addLayer(markers);

        function render() {
            const q = document.getElementById('search').value.trim().toLowerCase();
            const fc = document.getElementById('countryFilter').value;
            const fk = document.getElementById('categoryFilter').value;
            markers.clearLayers();
            const tbody = document.getElementById('rows');
            tbody.innerHTML = "";
            let shown = 0;
            HOTELS.forEach(h => {
                const [name, loc, lat, lng, slug, cat, img] = h;
                if (fc && country(loc) !== fc) return;
                if (fk && cat !== fk) return;
                if (q && !(name.toLowerCase().includes(q) || loc.toLowerCase().includes(q))) return;
                shown++;

                const url = URL_PREFIX + slug;
                let popup = '<b>' + esc(name) + '</b><br>' + esc(loc);
                if (cat) popup += '<br><span class="cat">' + esc(cat) + '</span>';
                popup += '<br><a href="' + url + '" target="_blank" rel="noopener">View deal</a>';
                if (img) popup += '<img class="popup-img" src="' + IMG_PREFIX + img + '" loading="lazy" alt="">';
                const m = L.marker([lat, lng]).bindPopup(popup);
                markers.addLayer(m);

                const tr = document.createElement('tr');
                tr.innerHTML = '<td class="num">' + shown + '</td><td><b>' + esc(name) + '</b></td><td>' + esc(loc) + '</td>' +
                    '<td><span class="cat">' + esc(cat) + '</span></td>' +
                    '<td><a href="' + url + '" target="_blank" rel="noopener">Open ↗</a></td>';
                tr.addEventListener('click', e => {
                    if (e.target.tagName === 'A') return;
                    map.flyTo([lat, lng], 13);
                    markers.zoomToShowLayer(m, () => m.openPopup());
                });
                tbody.appendChild(tr);
            });
            document.getElementById('count').textContent = shown + " of " + HOTELS.length + " hotels";
            if (shown > 0) map.fitBounds(markers.getBounds(), { padding: [40, 40] });
        }

        const sel = document.getElementById('countryFilter');
        [...new Set(HOTELS.map(h => country(h[1])))].sort().forEach(c => {
            const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o);
        });
        const ksel = document.getElementById('categoryFilter');
        [...new Set(HOTELS.map(h => h[5]).filter(Boolean))].sort().forEach(c => {
            const o = document.createElement('option'); o.value = c; o.textContent = c; ksel.appendChild(o);
        });
        sel.addEventListener('change', render);
        ksel.addEventListener('change', render);
        document.getElementById('search').addEventListener('input', render);

        render();
    </script>
